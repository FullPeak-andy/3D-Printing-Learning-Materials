# ============================================
# KLP1 K 表方案 - 温度/速度流量补偿 v1.0
# 仿拓竹 EEPROM K 表：4 耗材温度 K 表 + 速度 K 表 + 复合 K
# 适配 KLP1 V2.2 + Klipper 0.11.0+
# 安装：
#   1. 把这个文件传到 KLP1: ~/klipper_config/KLP1_FLOW_K_TABLE.cfg
#   2. 在 printer.cfg 末尾加: [include KLP1_FLOW_K_TABLE.cfg]
#   3. 重启 Klipper: sudo systemctl restart klipper
#   4. 测试: SET_MATERIAL MATERIAL=PLA + CALC_FLOW_K T=215 V=200
# ============================================

[gcode_macro _K_TABLE_VARS]
variable_material: "PLA"
variable_K_T: 1.000
variable_K_v: 1.000
variable_K_total: 1.000
gcode:

[gcode_macro SET_MATERIAL]
description: 设置当前耗材（自动加载对应温度 K 表）
gcode:
    {% set MAT = params.MATERIAL|default("PLA")|string %}
    SET_GCODE_VARIABLE MACRO=_K_TABLE_VARS VARIABLE=material VALUE="\"{MAT}\""
    M117 Material: {MAT}

[gcode_macro CALC_FLOW_K]
description: 计算复合 K 值（温度 × 速度）
gcode:
    {% set sv = printer["gcode_macro _K_TABLE_VARS"] %}
    {% set MAT = sv.material %}
    {% set T = params.T|default(200)|float %}
    {% set V = params.V|default(150)|float %}
    
    # ========== 温度 K 表（4 耗材）==========
    {% if MAT == "PLA" %}
        {% if T <= 180 %}
            {% set K_T = 0.92 %}
        {% elif T <= 200 %}
            {% set K_T = 0.92 + (T - 180) * 0.004 %}
        {% elif T <= 230 %}
            {% set K_T = 1.00 + (T - 200) * 0.004 %}
        {% else %}
            {% set K_T = 1.12 %}
        {% endif %}
    {% elif MAT == "PETG" %}
        {% if T <= 200 %}
            {% set K_T = 0.93 %}
        {% elif T <= 220 %}
            {% set K_T = 0.93 + (T - 200) * 0.0035 %}
        {% elif T <= 250 %}
            {% set K_T = 1.00 + (T - 220) * 0.004 %}
        {% else %}
            {% set K_T = 1.12 %}
        {% endif %}
    {% elif MAT == "ABS" %}
        {% if T <= 220 %}
            {% set K_T = 0.92 %}
        {% elif T <= 240 %}
            {% set K_T = 0.92 + (T - 220) * 0.004 %}
        {% elif T <= 270 %}
            {% set K_T = 1.00 + (T - 240) * 0.005 %}
        {% else %}
            {% set K_T = 1.15 %}
        {% endif %}
    {% elif MAT == "TPU" %}
        {% if T <= 200 %}
            {% set K_T = 0.95 %}
        {% elif T <= 220 %}
            {% set K_T = 0.95 + (T - 200) * 0.0025 %}
        {% elif T <= 240 %}
            {% set K_T = 1.00 + (T - 220) * 0.003 %}
        {% else %}
            {% set K_T = 1.06 %}
        {% endif %}
    {% else %}
        {% set K_T = 1.00 %}
    {% endif %}
    
    # ========== 速度 K 表 ==========
    {% if V <= 200 %}
        {% set K_v = 1.00 %}
    {% elif V <= 400 %}
        {% set K_v = 1.00 + (V - 200) * 0.00015 %}
    {% elif V <= 600 %}
        {% set K_v = 1.03 + (V - 400) * 0.0003 %}
    {% else %}
        {% set K_v = 1.09 + (V - 600) * 0.0001 %}
    {% endif %}
    
    # ========== 复合 K ==========
    {% set K_total = K_T * K_v %}
    
    # 保存
    SET_GCODE_VARIABLE MACRO=_K_TABLE_VARS VARIABLE=K_T VALUE={K_T}
    SET_GCODE_VARIABLE MACRO=_K_TABLE_VARS VARIABLE=K_v VALUE={K_v}
    SET_GCODE_VARIABLE MACRO=_K_TABLE_VARS VARIABLE=K_total VALUE={K_total}
    
    M117 MAT={MAT} T={T} V={V} K_T={K_T:.3f} K_v={K_v:.3f} K_total={K_total:.3f}

[gcode_macro GET_FLOW_K]
description: 显示当前 K 值
gcode:
    {% set sv = printer["gcode_macro _K_TABLE_VARS"] %}
    M117 MAT={sv.material} K_T={sv.K_T} K_v={sv.K_v} K_total={sv.K_total}
