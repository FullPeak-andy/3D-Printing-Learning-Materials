<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>F360 速通 10 步（SW 用户专版）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #0a0e1a;
    color: #c9d1d9;
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  header {
    background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%);
    padding: 24px 28px;
    border-radius: 12px;
    margin-bottom: 18px;
    box-shadow: 0 8px 24px rgba(255,123,0,0.3);
  }
  h1 { color: white; font-size: 26px; margin-bottom: 6px; }
  .subtitle { color: rgba(255,255,255,0.85); font-size: 13px; }
  .progress-bar {
    background: rgba(0,0,0,0.3);
    height: 8px;
    border-radius: 4px;
    margin-top: 14px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, #fff 0%, #ffe9d4 100%);
    height: 100%;
    width: 0%;
    transition: width 0.6s ease;
  }
  .progress-text {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .reset-btn {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  .reset-btn:hover { background: rgba(0,0,0,0.5); }

  /* Step cards */
  .step {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.3s;
  }
  .step.completed { border-color: #3fb950; background: #0d1a13; }
  .step.active { border-color: #ff7b00; box-shadow: 0 0 0 1px #ff7b00; }
  .step-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .step-header:hover { background: #1c2128; }
  .step-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .step-num {
    background: #21262d;
    color: #8b949e;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 15px;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step.completed .step-num { background: #3fb950; color: white; }
  .step.active .step-num { background: #ff7b00; color: white; }
  .step-title { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .step-time { color: #8b949e; font-size: 11px; margin-top: 2px; }
  .step-toggle {
    color: #8b949e;
    font-size: 18px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .step.open .step-toggle { transform: rotate(180deg); }
  .step-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s;
  }
  .step.open .step-content { max-height: 1800px; }
  .step-body {
    padding: 0 18px 16px;
    border-top: 1px solid #30363d;
    padding-top: 14px;
  }

  /* Section styles */
  .section-title {
    color: #ff7b00;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ops-list { list-style: none; padding: 0; }
  .ops-list li {
    padding: 5px 0 5px 18px;
    position: relative;
    line-height: 1.65;
    font-size: 13.5px;
  }
  .ops-list li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: #ff7b00;
  }
  .diff-table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 12.5px;
  }
  .diff-table th, .diff-table td {
    padding: 7px 10px;
    text-align: left;
    border: 1px solid #30363d;
  }
  .diff-table th {
    background: #21262d;
    color: #f0f6fc;
    font-weight: 600;
    font-size: 12px;
  }
  .diff-table tr:nth-child(even) { background: #1c2128; }
  .diff-table .sw { color: #8b949e; }
  .diff-table .f360 { color: #ff9d4d; }
  .kbd {
    background: #21262d;
    color: #f0f6fc;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'Cascadia Code', Consolas, monospace;
    font-size: 11px;
    border: 1px solid #30363d;
    margin: 0 1px;
  }
  .tip {
    background: #1f3a5f;
    border-left: 3px solid #58a6ff;
    padding: 9px 12px;
    border-radius: 4px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .tip::before { content: "💡 "; }
  .trap {
    background: #4a1a1a;
    border-left: 3px solid #f85149;
    padding: 9px 12px;
    border-radius: 4px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .trap::before { content: "⚠️ "; }
  .btn {
    background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(255,123,0,0.4); }
  .btn.secondary {
    background: #21262d;
    border: 1px solid #30363d;
  }
  .btn.done {
    background: #1a4a2a;
    border: 1px solid #3fb950;
  }

  /* Footer */
  .footer {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
    margin-top: 18px;
    text-align: center;
  }
  .footer h3 { color: #f0f6fc; margin-bottom: 8px; font-size: 15px; }
  .footer p { color: #8b949e; font-size: 12.5px; margin-bottom: 14px; }
  .footer-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* Print styles */
  @media print {
    body { background: white; color: #333; padding: 0; }
    .step { page-break-inside: avoid; border: 1px solid #ddd; }
    .step-header { background: #f5f5f5; }
    .step-num { background: #ddd; }
    .step.completed .step-num { background: #3fb950; }
    .step.active .step-num { background: #ff7b00; }
    .step-content { max-height: none !important; }
    .step-toggle { display: none; }
    .footer-buttons { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚀 Fusion 360 速通 10 步</h1>
    <p class="subtitle">针对 SolidWorks 用户 · 跳过基础概念 · 直击差异点 · 10-15 分钟上手</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="progressText">0 / 10 步已完成</span>
      <span>⏱️ 预计 10-15 分钟</span>
      <button class="reset-btn" onclick="resetProgress()">🔄 重置进度</button>
    </div>
  </header>

  <div id="stepsContainer"></div>

  <div class="footer">
    <h3>📦 实战应用</h3>
    <p>10 步完成后，建议直接打开你的 58MB Voron 2.4 R2 装配体练手</p>
    <div class="footer-buttons">
      <button class="btn" onclick="window.open('https://www.autodesk.com/products/fusion-360/overview', '_blank')">📥 F360 下载页</button>
      <button class="btn" onclick="window.open('https://www.youtube.com/results?search_query=fusion+360+for+solidworks+users', '_blank')">🎬 B 站/YouTube 教程</button>
      <button class="btn secondary" onclick="exportProgress()">💾 导出进度</button>
      <button class="btn secondary" onclick="window.print()">🖨️ 打印速通表</button>
    </div>
  </div>
</div>

      ["", "SolidWorks", "Fusion 360"],
      ["打开 58MB", "流畅", "<b>中等卡顿</b>（F360 弱项）"],
      ["Voron 装配", "需 STEP/IGES 转", "<b>直接 .f3d 原生</b>"],
      ["量尺寸", "Evaluate → Measure", "<b>Inspect → Measure</b>"]
    ],
    trap: "58MB 大装配体打开<b>会很慢</b>——第一次打开等 3-5 分钟。<b>免费版 GPU 加速可能被限</b>。",
    tip: "<b>导出 STEP 给 SW 用时勾选「Export all components in single file」</b>——SW 打开还是一个装配体，不会变成一堆散件。"
  }
];

let completed = new Set(JSON.parse(localStorage.getItem('f360_completed') || '[]'));

function render() {
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  steps.forEach((s, i) => {
    const isCompleted = completed.has(i);
    const isActive = i === 0 || completed.has(i-1) || isCompleted;
    const div = document.createElement('div');
    div.className = `step ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}`;
    div.innerHTML = `
      <div class="step-header" onclick="toggleStep(${i})">
        <div class="step-left">
          <div class="step-num">${isCompleted ? '✓' : i+1}</div>
          <div>
            <div class="step-title">${s.title}</div>
            <div class="step-time">⏱️ ${s.time}</div>
          </div>
        </div>
        <div class="step-toggle">▼</div>
      </div>
      <div class="step-content">
        <div class="step-body">
          <div class="section-title">📋 操作步骤</div>
          <ul class="ops-list">
            ${s.ops.map(o => `<li>${o}</li>`).join('')}
          </ul>
          <div class="section-title" style="margin-top:12px">⚖️ F360 vs SW 差异对比</div>
          <table class="diff-table">
            ${s.diff.map((row, ri) =>
              ri === 0
                ? `<tr><th>${row[0]}</th><th>${row[1]}</th><th>${row[2]}</th></tr>`
                : `<tr><td>${row[0]}</td><td class="sw">${row[1]}</td><td class="f360">${row[2]}</td></tr>`
            ).join('')}
          </table>
          ${s.tip ? `<div class="tip">${s.tip}</div>` : ''}
          ${s.trap ? `<div class="trap">${s.trap}</div>` : ''}
          <div style="margin-top:12px;text-align:right">
            <button class="btn ${isCompleted ? 'done' : ''}" onclick="event.stopPropagation();toggleComplete(${i})">
              ${isCompleted ? '✅ 已完成（点取消）' : '☑️ 标记完成'}
            </button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
  updateProgress();

  if (completed.size === 0) {
    setTimeout(() => toggleStep(0, true), 300);
  }
}

function toggleStep(i, forceOpen) {
  const allSteps = document.querySelectorAll('.step');
  const wasOpen = allSteps[i].classList.contains('open');
  if (forceOpen && !wasOpen) {
    allSteps[i].classList.add('open');
  } else {
    allSteps[i].classList.toggle('open');
  }
}

function toggleComplete(i) {
  if (completed.has(i)) {
    completed.delete(i);
  } else {
    completed.add(i);
  }
  localStorage.setItem('f360_completed', JSON.stringify([...completed]));
  render();
}

function updateProgress() {
  const total = steps.length;
  const done = completed.size;
  const pct = (done / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 步已完成`;
}

function resetProgress() {
  if (confirm('确定要重置学习进度吗？')) {
    completed.clear();
    localStorage.removeItem('f360_completed');
    render();
  }
}

function exportProgress() {
  const data = {
    title: 'F360 速通 10 步 学习进度',
    date: new Date().toLocaleString('zh-CN'),
    completed: [...completed].sort((a,b) => a-b).map(i => ({
      step: i + 1,
      title: steps[i].title,
      time: steps[i].time
    })),
    progress: `${completed.size}/${steps.length} (${Math.round(completed.size/steps.length*100)}%)`
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `f360_progress_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
